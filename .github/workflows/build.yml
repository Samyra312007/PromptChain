name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sdk-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: sdk
      - name: Build SDK
        run: npm run build
        working-directory: sdk
      - name: Run tests
        run: npm test
        working-directory: sdk
      - name: Lint check
        run: npm run lint
        working-directory: sdk

  rust-sdk-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build Rust SDK
        run: cargo build --release
        working-directory: sdk/packages/rust
      - name: Run Rust tests
        run: cargo test
        working-directory: sdk/packages/rust

  program-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Setup Solana
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v2.0.0/install)"
      - name: Build programs
        run: make build
        working-directory: program
      - name: Run program tests
        run: make test
        working-directory: program

  python-sdk-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install build pytest
        working-directory: sdk/packages/python
      - name: Build Python SDK
        run: python -m build
        working-directory: sdk/packages/python
      - name: Run Python tests
        run: pytest
        working-directory: sdk/packages/python

  multi-arch-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            arch: aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.arch }}-unknown-linux-gnu || rustup target add ${{ matrix.arch }}-apple-darwin || true
      - name: Cross-compile Rust SDK
        run: cargo build --release --target ${{ matrix.arch }}-unknown-linux-gnu
        working-directory: sdk/packages/rust

  codama-codegen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Codama dependencies
        run: npm ci
        working-directory: codama
      - name: Generate clients
        run: npm run generate
        working-directory: codama
      - name: Verify no uncommitted changes
        run: git diff --exit-code

  vscode-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: extensions/vscode
      - name: Lint extension
        run: npm run lint
        working-directory: extensions/vscode
      - name: Package extension
        run: npx vsce package --no-dependencies
        working-directory: extensions/vscode
