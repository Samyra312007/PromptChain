[package]
name = "promptchain-rs"
version = "0.1.0"
description = "PromptChain Rust SDK - Interact with the PromptChain protocol on Solana"
edition = "2021"
license = "MIT"

[lib]
name = "promptchain"
path = "src/lib.rs"

[[test]]
name = "integration"
path = "tests/integration.rs"

[dependencies]
solana-client = "2.2.0"
solana-sdk = "2.2.0"
solana-program = "2.2.0"
anchor-lang = "0.32.1"
anchor-spl = "0.32.1"
spl-token = "8.0.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
borsh = "1.5"
sha2 = "0.10"
thiserror = "2.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }

[features]
default = []
