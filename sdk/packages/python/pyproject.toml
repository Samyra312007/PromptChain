[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "promptchain-py"
version = "0.1.0"
description = "PromptChain Python SDK - Interact with the PromptChain protocol on Solana"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "solana>=0.36.0",
    "solders>=0.22.0",
    "anchorpy>=0.19.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pylint>=3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["promptchain"]
